<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <title>Portfolio</title>
</head>
<body class="d-flex flex-column min-vh-100">
    <nav class="navbar navbar-expand-lg navbar-dark custom-navbar">
        <div class="container">
    
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <img
                    src="assets/logo.png"
                    alt="Logo"
                    width="42"
                    class="logo-img">
    
                <span class="brand-text ms-2">
                    Stock Market Tracker
                </span>
            </a>
    
            <div class="navbar-nav ms-auto nav-links">
                <a class="nav-link" href="index.html">Home</a>
                <a class="nav-link" href="news.html">News</a>
                <a class="nav-link active-nav" href="portfolio.html">Portfolio</a>
                <a class="nav-link" href="pro.html">Pro</a>
                <a id="auth-link" class="nav-link login-link" href="login.html">
                    Login
                </a>
            </div>
    
        </div>
    </nav>

    

    <div class="container my-5">
        <h1>My Portfolio</h1>
    
        <div class="card p-3">
            <h4 id="portfolio-total"></h4>
        </div>
    
        <table class="table table-striped mt-4">
            <thead>
                <tr>
                    <th>Stock</th>
                    <th>Shares</th>
                    <th>Price</th>
                    <th>Total Value</th>
                    <th>Change</th>
                    <th>Actions</th>
                </tr>
            </thead>
        
            <tbody id="portfolio-body">
            </tbody>
        </table>

        <div class="card p-3 mt-4">
            <h5>Add Holding</h5>
        
            <div class="row">
                <div class="col-md-5">
                    <input
                        id="symbol-input"
                        class="form-control"
                        placeholder="AAPL">
                </div>
        
                <div class="col-md-5">
                    <input
                        id="shares-input"
                        type="number"
                        min="1"
                        class="form-control"
                        placeholder="Shares">
                </div>
        
                <div class="col-md-2">
                    <button
                        id="add-stock-btn"
                        class="btn btn-primary w-100">
                        Add
                    </button>
                </div>
            </div>
        </div>
    </div>

    <footer class="custom-footer mt-auto">
        <div class="container">
    
            <div class="footer-content">
    
                <div class="footer-brand">
                    <img
                        src="assets/logo.png"
                        alt="Logo"
                        width="42">
    
                    <div>
                        <h5>Stock Market Tracker</h5>
                        <p>
                            Track stocks, manage your portfolio,
                            and stay informed.
                        </p>
                    </div>
                </div>
    
                <div class="footer-links">
                    <a href="index.html">Home</a>
                    <a href="news.html">News</a>
                    <a href="portfolio.html">Portfolio</a>
                    <a href="pro.html">Pro</a>
                </div>
    
            </div>
    
            <hr>
    
            <div class="footer-bottom">
    
                <span>
                    © 2026 Stock Market Tracker. All rights reserved.
                </span>
    
                <span>
                    Powered by Finnhub API
                </span>
    
            </div>
    
        </div>
    </footer>

    <script src="js/portfolio.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
